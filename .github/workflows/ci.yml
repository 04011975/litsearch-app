name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - run: pytest -q -m "not integration"

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - run: docker compose up -d --build

      - run: |
          for i in {1..60}; do
            curl -fsS http://localhost:8001/health && exit 0
            sleep 2
          done
          docker compose logs
          exit 1

      - run: docker compose exec -T redis redis-cli FLUSHALL

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - env:
          LITSEARCH_BASE_URL: http://localhost:8001
        run: pytest -q -m integration